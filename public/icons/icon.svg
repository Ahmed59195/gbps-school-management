<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- School Building -->
  <g fill="#ffffff">
    <!-- Main Building -->
    <rect x="96" y="200" width="320" height="232" rx="8"/>
    <!-- Roof -->
    <polygon points="256,80 416,180 96,180"/>
    <!-- Door -->
    <rect x="216" y="312" width="80" height="120" rx="4" fill="#2563eb"/>
    <!-- Door Handle -->
    <circle cx="280" cy="372" r="8" fill="#ffffff"/>
    <!-- Windows Row 1 -->
    <rect x="120" y="224" width="56" height="56" rx="4" fill="#2563eb"/>
    <rect x="336" y="224" width="56" height="56" rx="4" fill="#2563eb"/>
    <!-- Windows Row 2 -->
    <rect x="120" y="312" width="56" height="56" rx="4" fill="#2563eb"/>
    <rect x="336" y="312" width="56" height="56" rx="4" fill="#2563eb"/>
    <!-- Flag Pole -->
    <rect x="252" y="56" width="8" height="44" fill="#ffffff"/>
    <!-- Flag -->
    <polygon points="260,56 260,88 296,72" fill="#fbbf24"/>
  </g>
</svg>
